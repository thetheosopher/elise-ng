<div class="page-content">
    <div class="page-header">
        <h2>View Tests <span class="badge bg-secondary" *ngIf="tests">{{tests.length}}</span></h2>
        <p class="text-muted">View controller tests for rendering, interaction, and animation timing.</p>
    </div>
    <div class="sample-grid">
        <a *ngFor="let test of tests; trackBy: trackByTestId"
           class="sample-card" [routerLink]="['/tests/view', test.id]">
            <span class="sample-card-title">{{test.title}}</span>
        </a>
    </div>
</div>
