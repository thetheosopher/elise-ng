<div class="auth-container">
    <div class="auth-card card shadow-sm" *ngIf="!formSubmitted">
        <div class="card-header">
            <div class="auth-brand-icon"><span class="fas fa-unlock-alt"></span></div>
            <h3>Request Password Reset Code</h3>
        </div>
        <div class="card-body">
            <form (ngSubmit)="onSubmit()" #requestForm="ngForm">
                <div class="mb-3">
                    <label for="username-reset">User Name or Email</label>
                    <input type="text" id="username" name="username" #username="ngModel" class="form-control" required
                        [(ngModel)]="loginDTO.Name" />
                    <div [hidden]="username.valid || username.pristine" class="alert alert-danger mt-1">
                        User Name or Email is Required
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100" [disabled]="!requestForm.form.valid">
                    Request Password Reset Code
                    <span *ngIf="processing" class="spinner-border spinner-border-sm"></span>
                </button>
            </form>
        </div>
        <div class="card-footer">
            <a routerLink='/login'>Login</a>
            <span class="mx-2">&middot;</span>
            <a routerLink='/register'>Register</a>
        </div>
    </div>
    <div class="auth-card card shadow-sm" *ngIf="formSubmitted && !resetComplete">
        <div class="card-header">
            <div class="auth-brand-icon"><span class="fas fa-unlock-alt"></span></div>
            <h3>Reset Password</h3>
        </div>
        <div class="card-body">
            <form (ngSubmit)="onSubmitReset()" #confirmationForm="ngForm">
                <div class="mb-3">
                    <label for="username-reset">User Name or Email</label>
                    <input type="text" id="username-reset" name="username-reset" #usernameReset="ngModel" class="form-control" required
                        [(ngModel)]="loginDTO.Name" />
                    <div [hidden]="usernameReset.valid || usernameReset.pristine" class="alert alert-danger mt-1">
                        User Name or Email is Required
                    </div>
                </div>
                <div class="mb-3">
                    <label for="code">Password Reset Code</label>
                    <input type="text" id="code" name="code" #code="ngModel" class="form-control" required
                        [(ngModel)]="loginDTO.ResetCode" />
                    <div [hidden]="code.valid || code.pristine" class="alert alert-danger mt-1">
                        Confirmation Code is Required
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" #password="ngModel" class="form-control" required
                        [(ngModel)]="loginDTO.Password" />
                    <div [hidden]="password.valid || password.pristine" class="alert alert-danger mt-1">
                        Password is Required
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password-confirm">Password Confirm</label>
                    <input type="password" id="password-confirm" name="password-confirm" #passwordconfirm="ngModel"
                        class="form-control" required [(ngModel)]="passwordConfirm" />
                    <div [hidden]="passwordconfirm.valid || passwordconfirm.pristine" class="alert alert-danger mt-1">
                        Password Confirm is Required
                    </div>
                    <div [hidden]="(passwordConfirm === loginDTO.Password) || passwordconfirm.pristine"
                        class="alert alert-danger mt-1">
                        Password Confirm Does Not Match Password
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100" [disabled]="!confirmationForm.form.valid">
                    Reset Password
                    <span *ngIf="processing" class="spinner-border spinner-border-sm"></span>
                </button>
            </form>
        </div>
        <div class="card-footer">
            <a routerLink='/login'>Login</a>
        </div>
    </div>
</div>
