<div class='editor-panel'>

    <div class='toolbar'>

        <h5 class='toolbar-title'>Model Designer</h5>

        <div class='toolbar-divider'></div>

        <!-- Container selector -->
        <div class='toolbar-group'>
            <app-container-selector [selectedContainer]="selectedContainer" (containerSelected)='onContainerSelected($event)'
                (containerDeleted)='onContainerDeleted($event)'>
            </app-container-selector>

            <!-- New Folder Button -->
            <button class='btn btn-light btn-sm' [disabled]='selectedFolderPath == null'
                (click)="containertree.showNewFolderModal()" aria-label="New Folder">
                <span placement="bottom" ngbTooltip="New Folder"
                    class='fas fa-folder-plus fa-lg'></span>
            </button>

            <!-- Delete Folder Button -->
            <button class='btn btn-light btn-sm' [disabled]='selectedFolderPath == null || selectedFolderPath === "/"'
                (click)="containertree.showDeleteFolderModal()" aria-label="Delete Folder">
                <span placement="bottom" ngbTooltip="Delete Folder"
                    class='fas fa-folder-minus fa-lg'></span>
            </button>
        </div>

        <div class='toolbar-divider'></div>

        <!-- File operations -->
        <div class='toolbar-group'>
            <!-- New Model Button -->
            <button class='btn btn-light btn-sm' [disabled]='selectedFolderPath == null'
                (click)="showNewModelModal()" aria-label="New Model">
                <span placement="bottom" ngbTooltip="New Model"
                    class='fas fa-file fa-lg'></span>
            </button>

            <!-- Save Model Button -->
            <button class='btn btn-light btn-sm' [disabled]='modelPath == null || model == null'
                    (click)="saveModel()" aria-label="Save Model">
                <span placement="bottom" ngbTooltip="Save Model"
                    class='fas fa-file-upload fa-lg'></span>
            </button>

            <button class='btn btn-light btn-sm'
                (click)="openVectorImportPicker(svgImportInput)" aria-label="Import Local SVG Or WMF">
                <span placement="bottom" ngbTooltip="Import Local SVG Or WMF"
                    class='fas fa-file-import fa-lg'></span>
            </button>
            <button class='btn btn-light btn-sm'
                (click)="openTraceImagePicker(traceImageInput)" aria-label="Trace Local Image">
                <span placement="bottom" ngbTooltip="Trace Local Image"
                    class='fas fa-image fa-lg'></span>
            </button>
            <div ngbDropdown class="d-inline-block">
                <button class='btn btn-light btn-sm' [disabled]='!canExportModel()'
                    id="exportModelDropdown" ngbDropdownToggle aria-label="Export Model">
                    <span placement="bottom" ngbTooltip="Export Model"
                        class='fas fa-file-export fa-lg'></span>
                </button>
                <div ngbDropdownMenu aria-labelledby="exportModelDropdown" class="edit-dropdown-menu">
                    <button ngbDropdownItem class="edit-dropdown-item" [disabled]='!canExportModel()'
                        (click)="exportCurrentModelAsSvg()">Export as SVG</button>
                    <button ngbDropdownItem class="edit-dropdown-item" [disabled]='!canExportModel()'
                        (click)="exportCurrentModelAsPng()">Export as PNG</button>
                    <button ngbDropdownItem class="edit-dropdown-item" [disabled]='!canExportModel()'
                        (click)="exportCurrentModelAsJpeg()">Export as JPEG</button>
                    <button ngbDropdownItem class="edit-dropdown-item" [disabled]='!canExportModel()'
                        (click)="exportCurrentModelAsWebp()">Export as WebP</button>
                </div>
            </div>
            <input #svgImportInput type="file" accept=".svg,.wmf,image/svg+xml,application/x-msmetafile,application/wmf" style="display: none"
                (change)="importLocalVector(svgImportInput.files, svgImportInput)">
            <input #traceImageInput type="file" accept=".png,.jpg,.jpeg,.gif,image/png,image/jpeg,image/gif" style="display: none"
                (change)="importLocalTraceImage(traceImageInput.files, traceImageInput)">
        </div>

        <div class='toolbar-spacer'></div>

        <!-- Status bar -->
        <div class='toolbar-status'>
            <div *ngIf="modelPath; else noModelPath">
                <span class="text-muted"><strong>{{modelContainerName}}{{modelPath}}</strong></span>
            </div>
            <ng-template #noModelPath>
                <span class="text-muted"><strong>{{selectedContainerName}}{{selectedFolderPath}}</strong></span>
            </ng-template>
            <span *ngIf="isBusy" class="spinner-border spinner-border-sm text-primary ms-2"></span>
        </div>

    </div>

    <!-- Main horizontal split -->
    <as-split unit='percent' direction='horizontal' gutterSize='5' class='editor-split'>
        <as-split-area size='20' minSize='10' maxSize='40'>
            <as-split unit='percent' direction='vertical' gutterSize='5'>
                <as-split-area size='33' minsize='10' maxsize='90'>
                    <app-container-tree (folderPathSelected)="onFolderPathSelected($event)" #containertree>
                    </app-container-tree>
                </as-split-area>
                <as-split-area size='67' appDnd (fileDropped)="onFileDropped($event)">
                    <app-alert id='container-explorer'></app-alert>
                    <div *ngIf='selectedFolderPath != null' class="upload-zone" (click)="fileUploadInput.click()">
                        <span class="fas fa-cloud-upload-alt upload-zone-icon"></span>
                        <span class="upload-zone-label">Drop files or click to upload</span>
                        <input type="file" id="fileUploadInput"
                            #fileUploadInput (change)='uploadFiles(fileUploadInput.files)' multiple>
                    </div>
                    <app-upload-list [uploads]="uploads" (cancelUpload)="cancelUpload($event)"></app-upload-list>
                    <app-file-list [selectedFolderPath]="selectedFolderPath" [folderFiles]="folderFiles"
                        (selectFile)="selectFile($event)" [showDownload]=false [showDate]=false [allowDelete]=false>
                    </app-file-list>
                </as-split-area>
            </as-split>
        </as-split-area>
        <as-split-area size='80'>
            <div *ngIf="model != null" >
            <nav ngbNav #nav="ngbNav" class="nav-tabs" [(activeId)]="modelEditorNavId" (navChange)="onNavChange($event)" [destroyOnHide]="false">
                <ng-container [ngbNavItem]="1">
                    <a ngbNavLink>Editor</a>
                    <ng-template ngbNavContent>
                        <!-- Model Editor -->
                        <div *ngIf="model != null" class="editor-toolbar">
                            <div class='toolbar-group'>
                                <select id="scale" [(ngModel)]="scale" ngbTooltip="Zoom"
                                    class='btn btn-sm btn-outline-primary'>
                                    <option [ngValue]="0.25">25%</option>
                                    <option [ngValue]="0.5">50%</option>
                                    <option [ngValue]="0.75">75%</option>
                                    <option [ngValue]="1">100%</option>
                                    <option [ngValue]="1.5">150%</option>
                                    <option [ngValue]="2">200%</option>
                                    <option [ngValue]="3">300%</option>
                                    <option [ngValue]="4">400%</option>
                                    <option [ngValue]="5">500%</option>
                                </select>
                                <select id="background" [(ngModel)]="background"
                                    class='btn btn-sm btn-outline-primary'
                                    ngbTooltip="Drawing Surface">
                                    <option value="grid">Grid</option>
                                    <option value="white">White</option>
                                    <option value="black">Black</option>
                                    <option value="gray">Gray</option>
                                </select>
                                <button class="btn btn-sm btn-outline-primary" type="button"
                                    [disabled]="!controller" (click)="showGridSettingsModal()"
                                    ngbTooltip="Grid and Snap Settings">
                                    <span class="fas fa-cog me-1"></span>Grid
                                </button>
                            </div>
                            <div class='toolbar-divider'></div>
                            <div class='toolbar-group'>
                                <button class="btn btn-sm btn-outline-primary" type="button"
                                    [disabled]="!canUndo" (click)="undo()" ngbTooltip="Undo (Ctrl+Z)">
                                    <span class="fas fa-undo me-1"></span>Undo
                                </button>
                                <button class="btn btn-sm btn-outline-primary" type="button"
                                    [disabled]="!canRedo" (click)="redo()" ngbTooltip="Redo (Ctrl+Y or Ctrl+Shift+Z)">
                                    <span class="fas fa-redo me-1"></span>Redo
                                </button>
                            </div>
                            <div class='toolbar-divider'></div>
                            <div class='toolbar-group'>
                                <div ngbDropdown class="d-inline-block">
                                    <button class="btn btn-sm btn-outline-primary" id="editMenuDropdown" ngbDropdownToggle>Edit</button>
                                            <div ngbDropdownMenu class="edit-dropdown-menu" aria-labelledby="editMenuDropdown">

                                                <button ngbDropdownItem class="edit-dropdown-item edit-dropdown-command" [disabled]="!canUndo" (click)="undo()"><span>Undo</span><span class="edit-dropdown-shortcut">Ctrl+Z</span></button>
                                                <button ngbDropdownItem class="edit-dropdown-item edit-dropdown-command" [disabled]="!canRedo" (click)="redo()"><span>Redo</span><span class="edit-dropdown-shortcut">Ctrl+Y</span></button>
                                                <div class="dropdown-divider"></div>

                                            <button ngbDropdownItem class="edit-dropdown-item edit-dropdown-command" [disabled]="!canCutSelected()" (click)="cutSelectedToClipboard()"><span>Cut</span><span class="edit-dropdown-shortcut">Ctrl+X</span></button>
                                            <button ngbDropdownItem class="edit-dropdown-item edit-dropdown-command" [disabled]="!canCopySelected()" (click)="copySelectedToClipboard()"><span>Copy</span><span class="edit-dropdown-shortcut">Ctrl+C</span></button>
                                            <button ngbDropdownItem class="edit-dropdown-item edit-dropdown-command" [disabled]="!canPasteClipboard()" (click)="pasteFromClipboard()"><span>Paste</span><span class="edit-dropdown-shortcut">Ctrl+V</span></button>
                                                <div class="dropdown-divider"></div>

                                                <button ngbDropdownItem class="edit-dropdown-item" (click)="showModelSizeModal()">Model Size...</button>
                                                <button ngbDropdownItem class="edit-dropdown-item" (click)="showAppearanceModal()">Appearance...</button>
                                                <button ngbDropdownItem class="edit-dropdown-item" (click)="showClipPathModal()">Clip Path...</button>
                                                <button ngbDropdownItem class="edit-dropdown-item" (click)="showTransformModal()">Transform...</button>

                                                <button *ngIf="selectedElementCount === 1" ngbDropdownItem class="edit-dropdown-item" (click)="showElementSizeModal()">Element Size...</button>
                                                <button *ngIf="singleElementType=='rectangle' || singleElementType=='polygon' || singleElementType=='path' || singleElementType=='regularPolygon' || singleElementType=='arrow' || singleElementType=='ring' || singleElementType=='arc' || singleElementType=='wedge'" ngbDropdownItem class="edit-dropdown-item" (click)="showGeometryModal()">Geometry...</button>

                                                <!-- Single element property dialogs -->
                                                <button *ngIf="singleElementType=='text'" ngbDropdownItem class="edit-dropdown-item" (click)="showTextElementModal()">Text...</button>
                                                <button *ngIf="singleElementType=='textPath'" ngbDropdownItem class="edit-dropdown-item" (click)="showTextPathElementModal()">Text Path...</button>
                                                <button *ngIf="singleElementType=='image'" ngbDropdownItem class="edit-dropdown-item" (click)="showImageElementModal()">Element Properties...</button>
                                                <button *ngIf="singleElementType=='model'" ngbDropdownItem class="edit-dropdown-item" (click)="showModelElementModal()">Element Properties...</button>
                                                <button *ngIf="singleElementType=='polyline'" ngbDropdownItem class="edit-dropdown-item" (click)="showPointsContainerModal()">Edit Points...</button>
                                                <button *ngIf="singleElementType=='polygon'" ngbDropdownItem class="edit-dropdown-item" (click)="showPointsContainerModal()">Edit Points...</button>
                                                <button *ngIf="singleElementType=='path'" ngbDropdownItem class="edit-dropdown-item" (click)="showPathElementModal()">Edit Commands...</button>

                                                <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canDuplicateSelected()" (click)="duplicateSelected()">Duplicate</button>
                                                <div ngbDropdown class="edit-dropdown-submenu">
                                                    <button id="editMoveMenuDropdown" class="edit-dropdown-submenu-toggle" ngbDropdownToggle>Move</button>
                                                    <div ngbDropdownMenu class="edit-dropdown-menu" aria-labelledby="editMoveMenuDropdown">
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canMoveSelectedUp()" (click)="moveSelectedUp()">Forward</button>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canMoveSelectedDown()" (click)="moveSelectedDown()">Backward</button>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canMoveSelectedToTop()" (click)="moveSelectedToTop()">To Top</button>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canMoveSelectedToBottom()" (click)="moveSelectedToBottom()">To Bottom</button>
                                                    </div>
                                                </div>
                                                <div ngbDropdown class="edit-dropdown-submenu">
                                                    <button id="editArrangeMenuDropdown" class="edit-dropdown-submenu-toggle" ngbDropdownToggle>Arrange</button>
                                                    <div ngbDropdownMenu class="edit-dropdown-menu" aria-labelledby="editArrangeMenuDropdown">
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canArrange()" (click)="alignSelectedLeft()">Align Left</button>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canArrange()" (click)="alignSelectedCenter()">Align Center</button>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canArrange()" (click)="alignSelectedRight()">Align Right</button>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canArrange()" (click)="alignSelectedTop()">Align Top</button>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canArrange()" (click)="alignSelectedMiddle()">Align Middle</button>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canArrange()" (click)="alignSelectedBottom()">Align Bottom</button>
                                                        <div class="dropdown-divider"></div>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canDistribute()" (click)="distributeSelectedHorizontally()">Distribute Horizontally</button>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canDistribute()" (click)="distributeSelectedVertically()">Distribute Vertically</button>
                                                    </div>
                                                </div>
                                                <div ngbDropdown class="edit-dropdown-submenu">
                                                    <button id="editResizeMenuDropdown" class="edit-dropdown-submenu-toggle" ngbDropdownToggle>Resize</button>
                                                    <div ngbDropdownMenu class="edit-dropdown-menu" aria-labelledby="editResizeMenuDropdown">
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canResize()" (click)="resizeSelectedWidth()">Make Same Width</button>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canResize()" (click)="resizeSelectedHeight()">Make Same Height</button>
                                                        <button ngbDropdownItem class="edit-dropdown-item" [disabled]="!canResize()" (click)="resizeSelectedSize()">Make Same Size</button>
                                                    </div>
                                                </div>
                                                <button ngbDropdownItem class="edit-dropdown-item" (click)="removeUnusedResources()">Remove Unused Resources</button>
                                                <button ngbDropdownItem class="edit-dropdown-item edit-dropdown-command" [disabled]="!canDeleteSelected()" (click)="deleteSelected()"><span>Delete</span><span class="edit-dropdown-shortcut">Delete</span></button>
                                            </div>
                                </div>
                            </div>
                            <div class='toolbar-divider'></div>
                            <div class='toolbar-group'>
                                <div ngbDropdown class="d-inline-block" ngbTooltip="Tool">
                                    <button class="btn btn-sm btn-outline-primary tool-dropdown-toggle"
                                        id="toolMenuDropdown" ngbDropdownToggle>{{activeToolLabel}}</button>
                                    <div ngbDropdownMenu class="edit-dropdown-menu tool-dropdown-menu" aria-labelledby="toolMenuDropdown">
                                        <button ngbDropdownItem class="edit-dropdown-item"
                                            *ngFor="let tool of toolOptions"
                                            [class.tool-dropdown-item-selected]="tool.value === activeToolName"
                                            (click)="selectTool(tool.value)">{{tool.label}}</button>
                                    </div>
                                </div>
                            </div>
                            <div class='toolbar-divider'></div>
                            <div class='toolbar-group'>
                                <button class='btn btn-sm btn-outline-primary' (click)="showStrokeModal()"
                                    ngbTooltip="Set Stroke">Stroke</button>
                                <div class="color-swatch">
                                    <div *ngIf="strokeType == 'color'" [ngbTooltip]='strokeTooltip' style="width: 100%; height: 100%" [style.backgroundColor]="strokeColor"></div>
                                </div>
                                <button class='btn btn-sm btn-outline-primary' (click)="showFillModal()"
                                    ngbTooltip="Set Fill">Fill</button>
                                <button class='btn btn-sm btn-outline-primary' (click)="showAppearanceModal()"
                                    ngbTooltip="Set Appearance">Appearance</button>
                                <button class='btn btn-sm btn-outline-primary' (click)="showClipPathModal()"
                                    ngbTooltip="Set Clip Path">Clip</button>
                                <button class='btn btn-sm btn-outline-primary' (click)="showTransformModal()"
                                    ngbTooltip="Set Transform">Transform</button>
                            </div>
                            <div class='toolbar-divider'></div>
                            <div class='toolbar-group'>
                                <button class='btn btn-sm btn-outline-primary' [disabled]='model == null'
                                    (click)="launchFullscreenSketch()"
                                    ngbTooltip="Sketch this model in fullscreen">
                                    <span class="fas fa-pen-fancy me-1"></span>Sketch
                                </button>
                            </div>
                        </div>
                        <div>
                            <div [ngClass]='backgroundClass()'>
                                <div [class.fileover]='isDragging' oncontextmenu="return false;">
                                    <app-elise-design #elise [model]="model" [scale]="scale"
                                        (mouseMovedView)="mouseMovedView($event)"
                                        (mouseEnteredView)="mouseEnteredView($event)"
                                        (mouseLeftView)="mouseLeftView($event)" (mouseDownView)="mouseDownView($event)"
                                        (mouseUpView)="mouseUpView($event)"
                                        (mouseEnteredElement)="mouseEnteredElement($event)"
                                        (mouseLeftElement)="mouseLeftElement($event)"
                                        (mouseDownElement)="mouseDownElement($event)"
                                        (mouseUpElement)="mouseUpElement($event)"
                                        (elementClicked)="elementClicked($event)"
                                        (contextMenuRequested)="contextMenuRequested($event)"
                                        (controllerSet)="controllerSet($event)"
                                        (selectionChanged)="selectionChanged($event)"
                                        (undoChanged)="undoChanged($event)"
                                        (elementCreated)="elementCreated($event)"
                                        (viewDragEnter)="viewDragEnter($event)" (viewDragLeave)="viewDragLeave($event)"
                                        (viewDrop)="viewDrop($event)">
                                    </app-elise-design>
                                    <div *ngIf="surfaceContextMenuVisible"
                                        #surfaceContextMenu
                                        class="surface-context-menu"
                                        [style.left.px]="surfaceContextMenuX"
                                        [style.top.px]="surfaceContextMenuY">
                                        <button class="edit-dropdown-item edit-dropdown-command" [disabled]="!canUndo" (click)="closeSurfaceContextMenu(); undo()"><span>Undo</span><span class="edit-dropdown-shortcut">Ctrl+Z</span></button>
                                        <button class="edit-dropdown-item edit-dropdown-command" [disabled]="!canRedo" (click)="closeSurfaceContextMenu(); redo()"><span>Redo</span><span class="edit-dropdown-shortcut">Ctrl+Y</span></button>
                                        <div class="surface-context-menu-divider"></div>

                                        <button class="edit-dropdown-item edit-dropdown-command" [disabled]="!canCutSelected()" (click)="closeSurfaceContextMenu(); cutSelectedToClipboard()"><span>Cut</span><span class="edit-dropdown-shortcut">Ctrl+X</span></button>
                                        <button class="edit-dropdown-item edit-dropdown-command" [disabled]="!canCopySelected()" (click)="closeSurfaceContextMenu(); copySelectedToClipboard()"><span>Copy</span><span class="edit-dropdown-shortcut">Ctrl+C</span></button>
                                        <button class="edit-dropdown-item edit-dropdown-command" [disabled]="!canPasteClipboard()" (click)="closeSurfaceContextMenu(); pasteFromClipboard()"><span>Paste</span><span class="edit-dropdown-shortcut">Ctrl+V</span></button>
                                        <div class="surface-context-menu-divider"></div>

                                        <button class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showModelSizeModal()">Model Size...</button>
                                        <button class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showAppearanceModal()">Appearance...</button>
                                        <button class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showClipPathModal()">Clip Path...</button>
                                        <button class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showTransformModal()">Transform...</button>
                                        <button class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showGridSettingsModal()">Grid and Snap Settings...</button>
                                        <button *ngIf="selectedElementCount === 1" class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showElementSizeModal()">Element Size...</button>
                                        <button *ngIf="singleElementType=='rectangle' || singleElementType=='polygon' || singleElementType=='path' || singleElementType=='regularPolygon' || singleElementType=='arrow' || singleElementType=='ring' || singleElementType=='arc' || singleElementType=='wedge'" class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showGeometryModal()">Geometry...</button>
                                        <button *ngIf="singleElementType=='text'" class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showTextElementModal()">Text...</button>
                                        <button *ngIf="singleElementType=='textPath'" class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showTextPathElementModal()">Text Path...</button>
                                        <button *ngIf="singleElementType=='image'" class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showImageElementModal()">Element Properties...</button>
                                        <button *ngIf="singleElementType=='model'" class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showModelElementModal()">Element Properties...</button>
                                        <button *ngIf="singleElementType=='polyline'" class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showPointsContainerModal()">Edit Points...</button>
                                        <button *ngIf="singleElementType=='polygon'" class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showPointsContainerModal()">Edit Points...</button>
                                        <button *ngIf="singleElementType=='path'" class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); showPathElementModal()">Edit Commands...</button>

                                        <button class="edit-dropdown-item" [disabled]="!canDuplicateSelected()" (click)="closeSurfaceContextMenu(); duplicateSelected()">Duplicate</button>

                                        <div class="surface-context-menu-header">Move</div>
                                        <button class="edit-dropdown-item" [disabled]="!canMoveSelectedUp()" (click)="closeSurfaceContextMenu(); moveSelectedUp()">Forward</button>
                                        <button class="edit-dropdown-item" [disabled]="!canMoveSelectedDown()" (click)="closeSurfaceContextMenu(); moveSelectedDown()">Backward</button>
                                        <button class="edit-dropdown-item" [disabled]="!canMoveSelectedToTop()" (click)="closeSurfaceContextMenu(); moveSelectedToTop()">To Top</button>
                                        <button class="edit-dropdown-item" [disabled]="!canMoveSelectedToBottom()" (click)="closeSurfaceContextMenu(); moveSelectedToBottom()">To Bottom</button>

                                        <div class="surface-context-menu-header">Arrange</div>
                                        <button class="edit-dropdown-item" [disabled]="!canArrange()" (click)="closeSurfaceContextMenu(); alignSelectedLeft()">Align Left</button>
                                        <button class="edit-dropdown-item" [disabled]="!canArrange()" (click)="closeSurfaceContextMenu(); alignSelectedCenter()">Align Center</button>
                                        <button class="edit-dropdown-item" [disabled]="!canArrange()" (click)="closeSurfaceContextMenu(); alignSelectedRight()">Align Right</button>
                                        <button class="edit-dropdown-item" [disabled]="!canArrange()" (click)="closeSurfaceContextMenu(); alignSelectedTop()">Align Top</button>
                                        <button class="edit-dropdown-item" [disabled]="!canArrange()" (click)="closeSurfaceContextMenu(); alignSelectedMiddle()">Align Middle</button>
                                        <button class="edit-dropdown-item" [disabled]="!canArrange()" (click)="closeSurfaceContextMenu(); alignSelectedBottom()">Align Bottom</button>
                                        <button class="edit-dropdown-item" [disabled]="!canDistribute()" (click)="closeSurfaceContextMenu(); distributeSelectedHorizontally()">Distribute Horizontally</button>
                                        <button class="edit-dropdown-item" [disabled]="!canDistribute()" (click)="closeSurfaceContextMenu(); distributeSelectedVertically()">Distribute Vertically</button>

                                        <div class="surface-context-menu-header">Resize</div>
                                        <button class="edit-dropdown-item" [disabled]="!canResize()" (click)="closeSurfaceContextMenu(); resizeSelectedWidth()">Make Same Width</button>
                                        <button class="edit-dropdown-item" [disabled]="!canResize()" (click)="closeSurfaceContextMenu(); resizeSelectedHeight()">Make Same Height</button>
                                        <button class="edit-dropdown-item" [disabled]="!canResize()" (click)="closeSurfaceContextMenu(); resizeSelectedSize()">Make Same Size</button>

                                        <div class="surface-context-menu-divider"></div>
                                        <button class="edit-dropdown-item" (click)="closeSurfaceContextMenu(); removeUnusedResources()">Remove Unused Resources</button>
                                        <button class="edit-dropdown-item edit-dropdown-command" [disabled]="!canDeleteSelected()" (click)="closeSurfaceContextMenu(); deleteSelected()"><span>Delete</span><span class="edit-dropdown-shortcut">Delete</span></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </ng-template>
                </ng-container>
                <ng-container [ngbNavItem]="2">
                    <a ngbNavLink>Model Text</a>
                    <ng-template ngbNavContent>
                        <div style='margin-top: 8px;'>
                            <pre>{{formattedJson}}</pre>
                        </div>
                    </ng-template>
                </ng-container>
                <ng-container [ngbNavItem]="3">
                    <a ngbNavLink>Elements</a>
                    <ng-template ngbNavContent>
                        <div class='element-list' *ngIf='model != null && model.elements.length > 0'>
                            <div class="single-element" *ngFor='let element of model.elements'>
                                <div class="info">
                                    <div class="name">
                                        <input type="checkbox" [checked]="elementSelected(element)" (change)="selectElement(element)">
                                        <span style="margin-left: 4px;">{{element.describe()}}</span>
                                    </div>
                                </div>
                                <div class="flexend" (click)="onRequestDeleteElement(element)" title="Delete">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="18" viewBox="0 0 14 18">
