    <div class='collapse navbar-collapse' id='navbarSupportedContent'>
        <ul class='navbar-nav me-auto'>

            <div ngbDropdown>

                <button class="btn btn-link nav-link" id="toolsdrop" ngbDropdownToggle>Tools</button>
                <div ngbDropdownMenu aria-labelledby="toolsdrop">
                    <a ngbDropdownItem routerLink='/tests/model-designer' routerLinkActive='active'>Model Designer</a>
                    <a ngbDropdownItem routerLink='/tests/model-playground' routerLinkActive='active'>Model Playground</a>
                    <a ngbDropdownItem routerLink='/tests/container-explorer' routerLinkActive='active'>Container Explorer</a>

            <div ngbDropdown>
