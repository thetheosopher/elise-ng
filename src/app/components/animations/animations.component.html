<div class="page-content">
    <div class="page-header">
        <h2>Animations <span class="badge bg-secondary" *ngIf="models">{{filteredModels.length}}</span></h2>
        <p class="text-muted">Animated 2D scenes demonstrating timers, transitions, and interactive behaviors.</p>
    </div>
    <input type="text" class="form-control mb-3" placeholder="Filter animations..."
           [(ngModel)]="filterText" style="max-width: 320px;">
    <div class="sample-grid">
        <a *ngFor="let model of filteredModels; trackBy: trackByModelId"
           class="sample-card" [routerLink]="['/animations', model.id]">
            <div class="sample-card-preview">
                <img class="sample-card-image" [src]="getThumbnailPath(model)" [alt]="model.name + ' preview'" loading="lazy">
            </div>
            <div class="sample-card-body">
                <span class="sample-card-title">{{model.name}}</span>
                <p class="sample-card-description">{{model.description}}</p>
            </div>
        </a>
    </div>
</div>
