<div style='height: calc(100vh - 131px);'>

    <div class='toolbar'>

        <h4>Model Playground</h4>

        <!-- Container selector -->
        <app-container-selector (containerSelected)='onContainerSelected($event)'
            (containerDeleted)='onContainerDeleted($event)' style='display: inline-block;'>
        </app-container-selector>

        <!-- New Folder Button -->
        <button class='btn btn-light py-0 px-1' [disabled]='selectedFolderPath == null'
            (click)="containertree.showNewFolderModal()">
            <span style='position: relative; top: 4px;' placement="bottom" ngbTooltip="New Folder"
                class='fas fa-folder-plus fa-2x'></span>
        </button>

        <!-- Delete Folder Button -->
        <button class='btn btn-light py-0 px-0' [disabled]='selectedFolderPath == null || selectedFolderPath === "/"'
            (click)="containertree.showDeleteFolderModal()">
            <span style='position: relative; top: 4px;' placement="bottom" ngbTooltip="Delete Folder"
                class='fas fa-folder-minus fa-2x'></span>
        </button>

        <div class='mx-1' style='position: relative; top: 6px; display: inline-block;'>
            <!-- Selected folder path label -->
            <span><strong>{{selectedContainerName}}{{selectedFolderPath}}</strong></span>
        </div>

        <!-- Upload file input -->
        <!--
        <form *ngIf='selectedFolderPath != null' class='small' style='display:inline-block;'>
            <input type="file" #fileUploadInput (change)='uploadFiles(fileUploadInput.files)' multiple
                style="margin-left: 8px; position: relative; top: 4px;" />
        </form>
        -->

        <span *ngIf="isBusy" class="spinner-border spinner-border-sm text-success"
            style="margin-left: 4px; position: relative; top: 2px;"></span>

    </div>

    <!-- Main horizontal split -->
    <as-split unit='percent' direction='horizontal' gutterSize='5' style='border: 5px solid rgb(231, 231, 231);'>
        <as-split-area size='20' minSize='10' maxSize='40'>
            <as-split unit='percent' direction='vertical' gutterSize='5'>
                <as-split-area size='33' minsize='10' maxsize='90'>
                    <app-container-tree (folderPathSelected)="onFolderPathSelected($event)" #containertree>
                    </app-container-tree>
                </as-split-area>
                <as-split-area size='67' appDnd (fileDropped)="onFileDropped($event)">
                    <app-alert id='container-explorer'></app-alert>
                    <div class="custom-file" *ngIf='selectedFolderPath != null'>
                        <input type="file" class="custom-file-input" id="fileUploadInput"
                            #fileUploadInput (change)='uploadFiles(fileUploadInput.files)' multiple>
                        <label class="custom-file-label" for="customFile">Upload Files</label>
                    </div>
                    <app-upload-list [uploads]="uploads" (cancelUpload)="cancelUpload($event)"></app-upload-list>
                    <app-file-list [selectedFolderPath]="selectedFolderPath" [folderFiles]="folderFiles"
                        (selectFile)="selectFile($event)" [showDownload]=false [showDate]=false [allowDelete]=false>
                    </app-file-list>
                </as-split-area>
            </as-split>
        </as-split-area>
        <as-split-area size='80'>
            <nav ngbNav #nav="ngbNav" class="nav-tabs" [(activeId)]="modelEditorNavId" (navChange)="onNavChange($event)"
                [destroyOnHide]="true">
                <ng-container [ngbNavItem]="1">
                    <a ngbNavLink>Edit</a>
                    <ng-template ngbNavContent>
                        <table style="margin-left: 4px;">
                            <tr style="vertical-align: baseline;">
                                <td>
                                    <div ngbDropdown class="d-inline-block">
                                        <button class="btn btn-sm btn-outline-primary" id="loadMenuDropdown"
                                            ngbDropdownToggle>Load</button>
                                        <div ngbDropdownMenu aria-labelledby="loadMenuDropdown" class="workshop-load-menu">
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('primitives', 'model')">Blank Model</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'ant-colony-trails')">Ant Colony Trails</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'aurora-borealis')">Aurora Borealis</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'cloth-simulation')">Cloth Simulation</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'conway-life-lab')">Conway Life Lab</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'digital-rain')">Digital Rain Simulation</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'dna-helix')">DNA Helix</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'ellipse-animation')">Ellipse Animation</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'fireflies')">Fireflies</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'fireworks')">Fireworks Display</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'flocking-swarm')">Flocking Swarm</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'fourier-flower')">Fourier Flower</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'fractal-zoom')">Fractal Zoom</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'geometric-morphing')">Geometric Morphing</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'gradient-animation')">Gradient Animation</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'heartbeat-monitor')">Heartbeat Monitor</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'harmonograph')">Harmonograph</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'hypotrochoid-weave')">Hypotrochoid Weave</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'kaleidoscope')">Kaleidoscope</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'lsystems-garden')">L-Systems Garden</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'lava-lamp')">Lava Lamp</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'line-animation')">Line Animation</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'lorenz-attractor')">Lorenz Attractor</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'maurer-rose')">Maurer Rose</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'metaballs')">Metaballs</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'moire-lattice')">Moire Lattice</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'multi-sprite-animation')">Multi Sprite Animation</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'newtons-cradle')">Newton's Cradle</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'aurora-clock')">Northern Lights Clock</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'ocean-waves')">Ocean Waves</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'particle-animation')">Particle Animation</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'pendulum-wave')">Pendulum Wave</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'plasma-effect')">Plasma Effect</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'polar-harmonic-mesh')">Polar Harmonic Mesh</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'radar-traffic')">Radar Traffic</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'raindrop-ripples')">Raindrop Ripples</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'reaction-diffusion')">Reaction-Diffusion</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'rotation-animation')">Rotation Animation</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'rrt-pathfinding')">RRT Pathfinding</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'snow-animation')">Snow Simulation</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'soft-body-blobs')">Soft Body Blobs</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'sine-lissajous-field')">Sine Lissajous Field</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'solar-system')">Solar System Orrery</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'spirograph')">Spirograph</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'sprite-transitions')">Sprite Image Transition</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'sprite-animation')">Sprite Sheet Animation</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'stargate-tunnel')">Stargate Tunnel</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'superformula-bloom')">Superformula Bloom</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'times-table-cardioid')">Times Table Cardioid</button>
                                            <button ngbDropdownItem class="btn btn-sm" (click)="loadModel('animations', 'tornado')">Tornado</button>
                                        </div>
                                        <button class="btn btn-sm btn-outline-primary m-1" (click)="runScript()" id="runScript">Run</button>
                                    </div>
                                </td>
                            </tr>
                        </table>
                        <div style='margin-top: 0px;'>
                            <textarea [(ngModel)]="playgroundText" name="playgroundText" id="playgroundText"
                                spellcheck="false" class="form-control" rows="12"
                                style="font-family: monospace; height: calc(100vh - 232px);"></textarea>
                        </div>
                    </ng-template>
                </ng-container>
                <ng-container [ngbNavItem]="2">
                    <a ngbNavLink>View</a>
                    <ng-template ngbNavContent>
                        <!-- Model Viewer -->
                        <div *ngIf="model != null" style="margin-bottom: 4px;">
                            <table style="margin-left: 4px;">
                                <tr style="vertical-align: baseline;">
                                    <td>
                                        <select id="scale" [(ngModel)]="scale" ngbTooltip="Zoom"
                                            class='btn btn-sm btn-outline-primary'>
                                            <option [ngValue]="0.25">25%</option>
                                            <option [ngValue]="0.5">50%</option>
                                            <option [ngValue]="0.75">75%</option>
                                            <option [ngValue]="1">100%</option>
                                            <option [ngValue]="1.5">150%</option>
                                            <option [ngValue]="2">200%</option>
                                            <option [ngValue]="3">300%</option>
                                            <option [ngValue]="4">400%</option>
                                            <option [ngValue]="5">500%</option>
                                        </select>
                                    </td>
                                    <td>
                                        <select id="background" [(ngModel)]="background"
                                            class='btn btn-sm btn-outline-primary' ngbTooltip="Drawing Surface">
                                            <option value="grid">Grid</option>
                                            <option value="white">White</option>
                                            <option value="black">Black</option>
                                            <option value="gray">Gray</option>
                                        </select>
                                    </td>
                                    <td>
                                        <div ngbDropdown class="d-inline-block">
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </div>
                        <div>
                            <div [ngClass]='backgroundClass()'>
                                <div [class.fileover]='isDragging'>
                                    <app-elise-view #elise [model]="model" [timerEnabled]="true" [scale]="scale">
                                    </app-elise-view>
                                </div>
                            </div>
                        </div>
                    </ng-template>
                </ng-container>
            </nav>

            <div [ngbNavOutlet]="nav" class="mt-2"></div>
        </as-split-area>
    </as-split>
</div>
