<!-- Modal Header -->
<div class="modal-header">
    <h4 class="modal-title">New Container</h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss('X')"></button>
</div>

<!-- Modal body -->
<form>
    <div class="modal-body">
        <div class="mb-3">
            <label for="containername">Container Name</label>
            <input type="text" id="containername" name="containername" #containername="ngModel"
                class="form-control" required [(ngModel)]="modalInfo.name" autofocus />
            <div [hidden]="containername.valid || containername.pristine" class="alert alert-danger">
                Container Name Is Required
            </div>
        </div>
    </div>
</form>

<!-- Modal footer -->
<div class="modal-footer">
    <button type="button" class="btn btn-primary" (click)="commit()">Create Container</button>
    <button type="button" class="btn btn-outline-secondary" (click)="activeModal.dismiss('Cancel')">Cancel</button>
</div>
