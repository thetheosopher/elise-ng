<div class="page-content">
    <div class="page-header">
        <h2>Surface Tests <span class="badge bg-secondary" *ngIf="tests">{{tests.length}}</span></h2>
        <p class="text-muted">Surface controller tests for multi-model presentations and transitions.</p>
    </div>
    <div class="sample-grid">
        <a *ngFor="let test of tests; trackBy: trackByTestId"
           class="sample-card" [routerLink]="['/tests/surface', test.id]">
            <app-surface-test-preview [test]="test"></app-surface-test-preview>
            <div class="sample-card-body">
                <span class="sample-card-title">{{test.title}}</span>
                <p class="sample-card-description">{{test.description}}</p>
            </div>
        </a>
    </div>
</div>
