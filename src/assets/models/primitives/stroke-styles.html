<p><b>Stroke styles</b> control more than color and width.</p>
<p>Elise supports <b>setStrokeDash</b>, <b>setLineCap</b>, and <b>setLineJoin</b> so strokes can render with different dash patterns, end caps, and corner joins.</p>
<p>This sample compares butt, round, and square caps, multiple dash patterns, and miter, round, and bevel joins.</p>
